name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for deploy-pages action
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true          # cache ~/.pub-cache between runs

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build WASM
        run: |
          emcmake cmake -S cpp -B cpp/build_wasm \
            -DCMAKE_BUILD_TYPE=Release
          emmake make -C cpp/build_wasm aegis_wasm -j$(nproc)
          cp cpp/build_wasm/aegis_wasm.js   web/aegis_wasm.js
          cp cpp/build_wasm/aegis_wasm.wasm web/aegis_wasm.wasm

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        # base-href uses the repo name so no hardcoding is needed
        # canvaskit renderer gives the best fidelity for charts/math
        run: |
          flutter build web \
            --release \
            --base-href "/${{ github.event.repository.name }}/" \
            --web-renderer canvaskit

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  # ── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
